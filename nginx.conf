# Idle Chronicles Nginx 反向代理配置
# 将域名 80 端口请求转发到 Express 3001 端口
#
# 使用方法:
# 1. 把此文件复制到 /etc/nginx/sites-available/idle-chronicles
# 2. 修改 server_name 为你的域名
# 3. sudo ln -s /etc/nginx/sites-available/idle-chronicles /etc/nginx/sites-enabled/
# 4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 你的域名.com;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
